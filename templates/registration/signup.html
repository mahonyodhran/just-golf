{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="header-bar">
  <h1>Register</h1>
</div>
<div class="card-body">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign Up</button>
  </form>
  <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
