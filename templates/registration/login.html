{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="header-bar">
  <h1>Login</h1>
</div>
<div class="card-body">
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
  </form>
  <p>Don't have an account? <a href="{% url 'signup' %}">Sign Up!</a></p>
</div>
{% endblock %}
