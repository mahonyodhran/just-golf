{% load static %}
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="keywords" content="golf,scorecards,track"/>
    <meta name="description" content="Track your golf scorecards"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/png" href="{% static 'images/favicon.ico' %}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>{% block title %} JustGolf {% endblock title %}</title>
  </head>

  <body class="container">
    <header
      class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
      <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
        <li><a href="{% url 'home' %}" class="nav-link px-2 link-secondary">Home</a></li>
        <li><a href="{% url 'about' %}" class="nav-link px-2 link-dark">About</a></li>
        {% if user.is_authenticated %}
          <li><a href="{% url 'course-index' %}" class="nav-link px-2 link-dark">Courses</a></li>
          <li><a href="#" class="nav-link px-2 link-dark">Scorecards</a></li>
        {% endif %}
      </ul>
      <div class="col-md-3 text-end">
        {% if user.is_authenticated %}
          <a href="{% url 'logout' %}" class="nav-link px-2 link-dark">Log Out</a>
        {% else %}
          <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
            <li><a href="{% url 'login' %}" class="nav-link px-2 link-dark">Log In</a></li>
            <li><a href="{% url 'signup' %}" class="nav-link px-2 link-secondary">Sign Up</a></li>
          </ul>
        {% endif %}
      </div>
    </header>
    <main>
      {% block content %}
      {% endblock content %}
    </main>
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>
  </body>

</html>
